# True color & terminal features
set -g default-terminal "tmux-256color"
set -sg terminal-overrides ",*:RGB"
set -ga terminal-features ",*:usstyle"

# General
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 100000
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 5
set -g focus-events on
set -g status off
setw -g mode-keys emacs

# Prefix: Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Extended keys
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'tmux*:extkeys'

# Clipboard: wl-copy for Wayland
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Splits & windows preserve cwd
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind c   new-window   -c "#{pane_current_path}"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
